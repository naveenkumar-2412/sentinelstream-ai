# Google Cloud Build → Cloud Run deployment
# Usage: gcloud builds submit --config cloudbuild.yaml

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sentinelstream:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sentinelstream:latest'
      - './backend'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sentinelstream:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sentinelstream:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sentinelstream'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sentinelstream:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'SENTINEL_LOG_LEVEL=INFO'

images:
  - 'gcr.io/$PROJECT_ID/sentinelstream:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sentinelstream:latest'

timeout: '600s'
